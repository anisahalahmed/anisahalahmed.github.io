<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Title</title>
        <link rel="stylesheet" href="./bootstrap-5.2.2-dist/css/bootstrap.css"/>
    </head>
    <body>
        <script src="./bootstrap-5.2.2-dist/js/bootstrap.js"></script>
        <nav class="navbar navbar-expand-lg bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="./index.html">Anisah Alahmed</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link" aria-current="page" href="./index.html">Home</a>
                        <a class="nav-link" href="./about.html">About</a>
                        <a class="nav-link active" href="./contact.html">Contact</a>
                    </div>
                </div>
            </div>
        </nav>
        <form id="form" action="results.html" method="get" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <input form="form" id="message" name="message" class="form-control" required/>
                <div class="invalid-feedback">
                    Please enter a message
                </div>
            </div>

            <div class="mb-3 form-check">
                <label for="check" class="form-check-label">Important Message</label>
                <input form="form" type="checkbox" class="form-check-input" id="check" name="check" />
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        <script>
            (() => {
                'use strict'

                // Fetch all the forms we want to apply custom Bootstrap validation styles to
                const forms = document.querySelectorAll('.needs-validation')

                // Loop over them and prevent submission
                Array.from(forms).forEach(form => {
                    form.addEventListener('submit', event => {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }

                        form.classList.add('was-validated')
                    }, false)
                })
            })()
        </script>
    </body>
</html>
